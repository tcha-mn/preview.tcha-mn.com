name: Cloudflare Redirects

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Whether to validate the published Sanity redirects or apply them to Cloudflare.
        required: true
        default: check
        type: choice
        options:
          - check
          - apply
  repository_dispatch:
    types:
      - sync-redirects

concurrency:
  group: cloudflare-redirects
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: ${{ inputs.mode == 'apply' && 'Apply Cloudflare redirects' || 'Check Cloudflare redirects' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync redirects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: npm run cloudflare:redirects:${{ inputs.mode }}
