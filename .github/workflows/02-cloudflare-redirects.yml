name: Cloudflare Redirects

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Whether to validate the published Sanity redirects or apply them to Cloudflare.
        required: true
        default: apply
        type: choice
        options:
          - apply
          - check
  repository_dispatch:
    types:
      - sync-redirects

concurrency:
  group: cloudflare-redirects
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: ${{ (inputs.mode || github.event.client_payload.mode || (github.event_name == 'repository_dispatch' && 'apply') || 'check') == 'apply' && 'Apply Cloudflare redirects' || 'Check Cloudflare redirects' }}
    runs-on: ubuntu-latest
    env:
      MODE: ${{ inputs.mode || github.event.client_payload.mode || (github.event_name == 'repository_dispatch' && 'apply') || 'check' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sync redirects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: node scripts/sync-cloudflare-redirects.mjs --${MODE}
